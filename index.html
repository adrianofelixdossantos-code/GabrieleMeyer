<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Adriano ❤ Gabriele</title>

<style>

body{
margin:0;
font-family:Segoe UI;
text-align:center;
color:white;
background:url("GABI.jpg") center/cover fixed;
}

#start{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:url("GABI.jpg") center/cover;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
z-index:999;
}

#start button{
padding:15px 40px;
font-size:22px;
border:none;
border-radius:30px;
background:#ff4d6d;
color:white;
cursor:pointer;
}

.nome{
font-size:55px;
font-weight:bold;
background:linear-gradient(90deg,#fff,#ff9a9e,#fff);
background-size:200%;
-webkit-background-clip:text;
color:transparent;
animation:shine 3s linear infinite;
}

@keyframes shine{
0%{background-position:0%}
100%{background-position:200%}
}

#contador{
font-size:26px;
margin:20px;
}

.mensagem{
max-width:700px;
margin:auto;
font-size:20px;
line-height:1.6;
padding:20px;
background:rgba(0,0,0,0.6);
border-radius:15px;
}

.galeria{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:15px;
padding:20px;
}

.galeria img{
width:220px;
height:160px;
object-fit:cover;
border-radius:10px;
cursor:pointer;
transition:0.4s;
}

.galeria img:hover{
transform:scale(1.2);
}

video{
width:80%;
max-width:480px;
border-radius:20px;
margin-top:20px;
}

.petala{
position:fixed;
top:-20px;
font-size:20px;
animation:cair 10s linear infinite;
}

@keyframes cair{
0%{transform:translateY(-20px)}
100%{transform:translateY(110vh)}
}

.balao{
position:fixed;
bottom:-100px;
font-size:40px;
cursor:pointer;
animation:subir 12s linear;
}

@keyframes subir{
0%{transform:translateY(0)}
100%{transform:translateY(-120vh)}
}

.comentarios{
max-width:600px;
margin:auto;
background:rgba(0,0,0,0.6);
padding:20px;
border-radius:15px;
}

input,textarea{
width:90%;
padding:10px;
margin:10px;
border-radius:8px;
border:none;
}

button{
padding:10px 20px;
border:none;
border-radius:8px;
background:#ff4d6d;
color:white;
cursor:pointer;
}

.comentario{
background:rgba(255,255,255,0.1);
margin:10px;
padding:10px;
border-radius:10px;
}

</style>

</head>

<body>

<div id="start">

<h1>Uma surpresa para você ❤</h1>

<button onclick="entrar()">Entrar</button>

</div>

<audio id="musica" loop>
<source src="GUSTTAVOLIMA.mp3">
</audio>

<header>

<h1 class="nome">Gabriele</h1>

<div id="contador"></div>

</header>

<section>

<div class="mensagem">

Hoje é um dia muito especial.

Celebramos não apenas mais um ano da sua vida, mas a pessoa incrível que você é.

Seu sorriso ilumina meus dias.

Feliz aniversário meu amor ❤

</div>

</section>

<h2>Nossos Momentos</h2>

<div class="galeria">

<img src="momento.jpg">
<img src="momento2.jpg">
<img src="momento3.jpg">
<img src="momento11.jpg">
<img src="mom1.jpg">
<img src="mom2.jpg">
<img src="mom3.jpg">
<img src="mom4.jpg">
<img src="mom5.jpg">

</div>

<h2>Nosso vídeo</h2>

<video id="video" controls>
<source src="MOVIE.mp4">
</video>

<h2>Deixe uma mensagem para Gabriele</h2>

<div class="comentarios">

<input id="nome" placeholder="Seu nome">

<textarea id="texto" placeholder="Escreva sua mensagem"></textarea>

<br>

<button onclick="comentar()">Enviar</button>

<button onclick="modoAdmin()">Modo administrador</button>

<div id="lista"></div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getFirestore,
collection,
addDoc,
onSnapshot,
deleteDoc,
doc,
serverTimestamp
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {

apiKey:"COLE_AQUI",
authDomain:"COLE_AQUI",
projectId:"COLE_AQUI",
storageBucket:"COLE_AQUI",
messagingSenderId:"COLE_AQUI",
appId:"COLE_AQUI"

};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const comentarios = collection(db,"mensagens");

let admin=false
let ultimoEnvio=0

window.entrar=function(){

document.getElementById("start").style.display="none"
document.getElementById("musica").play()

}

document.getElementById("video").addEventListener("play",function(){

document.getElementById("musica").pause()

})

var data=new Date("Apr 28, 2026 00:00:00").getTime()

setInterval(function(){

var agora=new Date().getTime()

var distancia=data-agora

var dias=Math.floor(distancia/(1000*60*60*24))

var horas=Math.floor((distancia%(1000*60*60*24))/(1000*60*60))

var minutos=Math.floor((distancia%(1000*60*60))/(1000*60))

document.getElementById("contador").innerHTML=
"Faltam "+dias+" dias "+horas+"h "+minutos+"m"

},1000)

window.comentar = async function(){

let nome=document.getElementById("nome").value.trim()
let texto=document.getElementById("texto").value.trim()

if(nome==""||texto=="") return

if(Date.now()-ultimoEnvio<5000){

alert("Espere alguns segundos para enviar outra mensagem")

return

}

ultimoEnvio=Date.now()

await addDoc(comentarios,{
nome:nome,
texto:texto,
data:serverTimestamp()
})

animacao()

document.getElementById("nome").value=""
document.getElementById("texto").value=""

}

function animacao(){

let aviso=document.createElement("div")

aviso.innerText="Mensagem enviada ❤"

aviso.style.position="fixed"
aviso.style.bottom="30px"
aviso.style.left="50%"
aviso.style.transform="translateX(-50%)"
aviso.style.background="#ff4d6d"
aviso.style.padding="10px 20px"
aviso.style.borderRadius="10px"

document.body.appendChild(aviso)

setTimeout(()=>aviso.remove(),2000)

}

window.modoAdmin=function(){

let senha=prompt("Senha administrador")

if(senha==="gabriele30"){

admin=true
alert("Modo administrador ativado")

}

}

onSnapshot(comentarios,(snapshot)=>{

let lista=document.getElementById("lista")
lista.innerHTML=""

snapshot.forEach(docSnap=>{

let c=docSnap.data()

let div=document.createElement("div")
div.className="comentario"

let botao=""

if(admin){

botao=`<br><button onclick="apagar('${docSnap.id}')">Apagar</button>`

}

div.innerHTML=`<b>${c.nome}</b><br>${c.texto}${botao}`

lista.appendChild(div)

})

})

window.apagar = async function(id){

await deleteDoc(doc(db,"mensagens",id))

}

</script>

</body>
</html>
